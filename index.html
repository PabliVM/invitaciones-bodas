<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
      --text: #e0e0e0; --text-muted: #666;
      --accent: #b8860b; --accent-hover: #d4a017; --danger: #c0392b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Lato', sans-serif; min-height: 100vh; }
    .header { border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
    .header__logo { font-size: 15px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
    .header__sub { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }
    .main { max-width: 960px; margin: 0 auto; padding: 48px 32px; }
    .main__titulo { font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 24px; }
    .card-nueva { border: 2px dashed var(--border); padding: 32px; text-align: center; cursor: pointer; transition: border-color 0.2s; margin-bottom: 24px; }
    .card-nueva:hover { border-color: var(--accent); }
    .card-nueva__icono { font-size: 28px; color: var(--accent); margin-bottom: 12px; }
    .card-nueva__texto { font-size: 14px; color: var(--text-muted); }
    .bodas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .boda-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; transition: border-color 0.2s; }
    .boda-card:hover { border-color: #444; }
    .boda-card__nombres { font-size: 18px; font-weight: 300; color: var(--text); margin-bottom: 6px; }
    .boda-card__meta { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.6; }
    .boda-card__acciones { display: flex; gap: 8px; }
    .btn { padding: 8px 14px; border: none; font-family: inherit; font-size: 12px; font-weight: 400; cursor: pointer; transition: all 0.15s; text-decoration: none; display: inline-block; }
    .btn--primario { background: var(--accent); color: #fff; flex: 1; text-align: center; }
    .btn--primario:hover { background: var(--accent-hover); }
    .btn--secundario { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn--secundario:hover { color: var(--text); border-color: #444; }
    .btn--peligro { background: transparent; color: var(--danger); border: 1px solid transparent; padding: 8px 10px; }
    .btn--peligro:hover { border-color: var(--danger); }
    .cargando { text-align: center; padding: 48px; color: var(--text-muted); font-size: 13px; }
    .vacio { text-align: center; padding: 48px; color: var(--text-muted); }
    .vacio__texto { font-size: 14px; margin-bottom: 8px; }
    .vacio__sub { font-size: 12px; color: #444; }
  </style>
</head>
<body>

  <header class="header">
    <div>
      <div class="header__logo">Wedding Builder</div>
      <div class="header__sub">Panel de gestión</div>
    </div>
  </header>

  <main class="main">
    <p class="main__titulo">Tus bodas</p>
    <div class="card-nueva" id="btn-nueva-boda">
      <div class="card-nueva__icono">＋</div>
      <div class="card-nueva__texto">Crear nueva boda</div>
    </div>
    <div id="bodas-container">
      <div class="cargando">Cargando…</div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/db.js"></script>

  <script>
    DB.init();

    document.getElementById('btn-nueva-boda').addEventListener('click', function() {
      window.location.href = 'editor.html';
    });

    async function cargarBodas() {
      var container = document.getElementById('bodas-container');
      try {
        var bodas = await DB.listarBodas();
        if (bodas.length === 0) {
          container.innerHTML = '<div class="vacio"><p class="vacio__texto">Aún no hay bodas creadas.</p><p class="vacio__sub">Crea la primera con el botón de arriba.</p></div>';
          return;
        }
        var meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
        var html = '<div class="bodas-grid">';
        for (var i = 0; i < bodas.length; i++) {
          var b = bodas[i];
          var nombre = (b.pareja) ? ((b.pareja.novio || '—') + ' & ' + (b.pareja.novia || '—')) : (b.meta && b.meta.titulo ? b.meta.titulo : 'Sin nombre');
          var fechaMes = (b.fecha && b.fecha.mes) ? meses[parseInt(b.fecha.mes) - 1] : '—';
          var fechaStr = b.fecha ? (b.fecha.dia + ' ' + fechaMes + ' ' + b.fecha.anio) : '—';
          var creadoEn = (b.creadoEn && b.creadoEn.toDate) ? b.creadoEn.toDate().toLocaleDateString('es-ES') : '—';
          html += '<div class="boda-card">';
          html += '<div class="boda-card__nombres">' + nombre + '</div>';
          html += '<div class="boda-card__meta">Fecha: ' + fechaStr + '<br>Creada: ' + creadoEn + '</div>';
          html += '<div class="boda-card__acciones">';
          html += '<a href="editor.html?id=' + b.id + '" class="btn btn--primario">Editar</a>';
          html += '<a href="invitation.html?id=' + b.id + '" target="_blank" class="btn btn--secundario">Ver</a>';
          html += '<button class="btn btn--peligro" onclick="eliminar(\'' + b.id + '\')">✕</button>';
          html += '</div></div>';
        }
        html += '</div>';
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = '<div class="cargando">Error al cargar. Revisa la consola.</div>';
        console.error(err);
      }
    }

    async function eliminar(id) {
      if (!confirm('¿Eliminar esta boda? Esta acción no se puede deshacer.')) return;
      await DB.eliminarBoda(id);
      cargarBodas();
    }

    cargarBodas();
  </script>

</body>
</html>>
